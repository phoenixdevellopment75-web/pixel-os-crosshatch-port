name: "🔨 Build PixelOS — Pixel 3 XL (crosshatch)"

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build type"
        default: "user"
        type: choice
        options: [user, userdebug]

env:
  DEVICE:   crosshatch
  MANIFEST: https://github.com/PixelOS-AOSP/manifest
  BRANCH:   fourteen

jobs:
  build:
    name: "🏗️ Build (GitHub-Hosted)"
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

      # ── 1. Free up ~65 GB on the runner ─────────────────────────────────────
      - name: "💾 Maximize disk space"
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb:      6144
          swap-size-mb:         8192
          build-mount-path:     /mnt/workspace
          remove-dotnet:        "true"
          remove-android:       "true"
          remove-haskell:       "true"
          remove-codeql:        "true"
          remove-docker-images: "true"

      # ── 2. Checkout this device tree ─────────────────────────────────────────
      - name: "📥 Checkout device tree"
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}/device_tree

      # ── 3. Install build deps (all verified on ubuntu-22.04) ─────────────────
      - name: "📦 Install build deps"
        run: |
          sudo apt-get update -qq
          # Core packages — all confirmed present on ubuntu-22.04
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            lib32ncurses5-dev lib32z1-dev libelf-dev \
            libncurses5-dev libssl-dev libxml2-utils lzop \
            m4 openjdk-11-jdk pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python3-pip
          # Optional packages — install with fallback so they don't break the build
          sudo apt-get install -y --no-install-recommends \
            lib32readline-dev libncurses5 libtinfo5 \
            libwxgtk3.2-dev imagemagick unzip 2>/dev/null || \
          sudo apt-get install -y --no-install-recommends \
            lib32readline-dev libncurses5 libtinfo5 \
            imagemagick unzip 2>/dev/null || true
          # Make python3 the default 'python' command
          sudo ln -sf /usr/bin/python3 /usr/local/bin/python
          echo "✅ Build deps installed"
          python3 --version
          java -version

      # ── 4. ccache ────────────────────────────────────────────────────────────
      - name: "⚡ Restore ccache"
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key:  ccache-crosshatch-${{ github.sha }}
          restore-keys: ccache-crosshatch-

      - name: "⚙️ Configure ccache"
        run: |
          ccache --max-size=8G
          echo "USE_CCACHE=1"                >> $GITHUB_ENV
          echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache"    >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1"           >> $GITHUB_ENV

      # ── 5. repo tool ─────────────────────────────────────────────────────────
      - name: "🔧 Setup repo tool"
        run: |
          mkdir -p ~/bin
          curl -fsSL \
            https://storage.googleapis.com/git-repo-downloads/repo \
            -o ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.email "ci@pixelos.net"
          git config --global user.name  "PixelOS CI"
          git config --global color.ui   false

      # ── 6. Init manifest ─────────────────────────────────────────────────────
      - name: "📋 Init PixelOS manifest"
        run: |
          mkdir -p /mnt/workspace
          cd /mnt/workspace
          ~/bin/repo init \
            --depth=1 \
            -u ${{ env.MANIFEST }} \
            -b ${{ env.BRANCH }} \
            --no-clone-bundle \
            --no-tags
          echo "✅ Manifest initialized"

      # ── 7. Inject local manifests ────────────────────────────────────────────
      - name: "🗺️ Inject local manifests"
        run: |
          mkdir -p /mnt/workspace/.repo/local_manifests
          cp ${{ github.workspace }}/device_tree/local_manifests/roomservice.xml \
             /mnt/workspace/.repo/local_manifests/
          cp ${{ github.workspace }}/device_tree/local_manifests/remove_unneeded.xml \
             /mnt/workspace/.repo/local_manifests/
          echo "✅ Local manifests injected"

      # ── 8. Repo sync ─────────────────────────────────────────────────────────
      # NOTE: --optimized-fetch and --fail-fast removed — not supported by all
      # repo versions. Using safe flags only.
      - name: "🔄 Repo sync (takes 30–60 min)"
        run: |
          cd /mnt/workspace
          ~/bin/repo sync \
            -c \
            -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            2>&1 | tee /tmp/sync.log || {
              echo "❌ Sync failed. Last 50 lines:"
              tail -50 /tmp/sync.log
              exit 1
            }
          echo "✅ Sync complete"
          df -h /mnt/workspace

      # ── 9. Install device tree + patches ─────────────────────────────────────
      - name: "📁 Install device tree extras"
        run: |
          mkdir -p /mnt/workspace/device/google/crosshatch/patches
          cp -r ${{ github.workspace }}/device_tree/patches/. \
                /mnt/workspace/device/google/crosshatch/patches/
          echo "✅ Device tree extras copied"

      # ── 10. Prebuilt kernel ───────────────────────────────────────────────────
      - name: "🐧 Fetch prebuilt kernel"
        run: |
          PREBUILT="/mnt/workspace/device/google/crosshatch/prebuilt"
          VENDOR_K="/mnt/workspace/vendor/google/crosshatch/kernel/Image.lz4-dtb"
          mkdir -p "$PREBUILT"
          if [ -f "$VENDOR_K" ]; then
            echo "✅ Kernel found in vendor blobs"
            cp "$VENDOR_K" "$PREBUILT/Image.lz4-dtb"
            [ -f "${VENDOR_K%/*}/dtbo.img" ] && \
              cp "${VENDOR_K%/*}/dtbo.img" "$PREBUILT/dtbo.img"
          else
            echo "⚠️ No prebuilt kernel — falling back to source compile"
            # Remove prebuilt lines so BoardConfig.mk falls back to source compile
            sed -i \
              '/TARGET_PREBUILT_KERNEL\|BOARD_PREBUILT_DTBOIMAGE/d' \
              /mnt/workspace/device/google/crosshatch/BoardConfig.mk
          fi

      # ── 11. Apply patches ─────────────────────────────────────────────────────
      - name: "🩹 Apply crosshatch patches"
        run: |
          cd /mnt/workspace
          bash device/google/crosshatch/patches/apply_patches.sh

      # ── 12. Build ─────────────────────────────────────────────────────────────
      - name: "🔨 Build ROM (2–4 hours)"
        run: |
          cd /mnt/workspace
          source build/envsetup.sh
          lunch pixelos_crosshatch-${{ github.event.inputs.BUILD_TYPE || 'user' }}
          make bacon -j$(nproc --all) 2>&1 | tee /tmp/build.log

      # ── 13. Collect outputs ────────────────────────────────────────────────────
      - name: "📦 Collect artifacts"
        id: out
        run: |
          D="/mnt/workspace/out/target/product/crosshatch"
          ZIP=$(ls ${D}/PixelOS*.zip 2>/dev/null | tail -1)
          [ -z "$ZIP" ] && { echo "❌ No ROM zip found"; ls "$D" || true; exit 1; }
          echo "zip=${ZIP}"                            >> $GITHUB_OUTPUT
          echo "name=$(basename ${ZIP})"               >> $GITHUB_OUTPUT
          echo "md5=$(md5sum ${ZIP} | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d)"              >> $GITHUB_OUTPUT
          cp ${D}/boot.img   /tmp/ 2>/dev/null || true
          cp ${D}/dtbo.img   /tmp/ 2>/dev/null || true
          cp ${D}/vbmeta.img /tmp/ 2>/dev/null || true

      # ── 14. Upload artifacts ──────────────────────────────────────────────────
      - name: "⬆️ Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "PixelOS-crosshatch-${{ steps.out.outputs.date }}"
          path: |
            ${{ steps.out.outputs.zip }}
            /tmp/boot.img
            /tmp/dtbo.img
            /tmp/vbmeta.img
          retention-days: 7

      # ── 15. GitHub Release ────────────────────────────────────────────────────
      - name: "🚀 Create GitHub Release"
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.out.outputs.date }}"
          name:     "PixelOS 14 — Pixel 3 XL — ${{ steps.out.outputs.date }}"
          body: |
            ## PixelOS Android 14 — Pixel 3 XL (crosshatch)
            **MD5:** `${{ steps.out.outputs.md5 }}`
            **Build type:** ${{ github.event.inputs.BUILD_TYPE || 'user' }}

            ### Flash
            1. Boot TWRP → Wipe System + Data + Dalvik
            2. Flash ZIP → Reboot (first boot ~5 min)

            ✅ NFC | ✅ Wireless Charging | ✅ GCam | ✅ SELinux Enforcing
          files: |
            ${{ steps.out.outputs.zip }}
            /tmp/boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 16. Telegram ──────────────────────────────────────────────────────────
      - name: "📨 Telegram notification"
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="✅ *PixelOS 14 — Pixel 3 XL*%0A📦 \`${{ steps.out.outputs.name }}\`%0A🔑 \`${{ steps.out.outputs.md5 }}\`%0A📥 https://github.com/phoenixdevellopment75-web/pixel-os-crosshatch-port/releases"

      # ── 17. ccache stats ──────────────────────────────────────────────────────
      - name: "📊 ccache stats"
        if: always()
        run: ccache --show-stats

      # ── 18. Upload log on failure ─────────────────────────────────────────────
      - name: "📋 Upload build log on failure"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "build-log-failed"
          path: |
            /tmp/build.log
            /tmp/sync.log
          retention-days: 3
