name: "🔨 Build PixelOS — Pixel 3 XL (crosshatch)"

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build type (user = release, userdebug = for testing)"
        default: "userdebug"
        type: choice
        options: [userdebug, user]

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────
env:
  ROM_MANIFEST: https://github.com/PixelOS-AOSP/manifest
  ROM_BRANCH:   fourteen
  DEVICE:       crosshatch
  BUILD_DIR:    /mnt/workspace

jobs:
  build:
    name: "Build PixelOS — crosshatch"
    # ubuntu-20.04 has ALL required Android build packages.
    # DO NOT change to 22.04 — it dropped libsdl1.2-dev, libwxgtk3.0-gtk3-dev etc.
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 1 — Free up disk space
    # Removes unused tools to give us ~65 GB on /mnt/workspace
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🗑️ Free disk space"
      run: |
        echo "Before cleanup:"
        df -h
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/.ghcup \
          "$AGENT_TOOLSDIRECTORY"
        sudo docker image prune --all --force 2>/dev/null || true
        echo "After cleanup:"
        df -h

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 2 — Mount large workspace volume on /mnt
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "💾 Mount build workspace"
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb:      4096
        swap-size-mb:         8192
        build-mount-path:     /mnt/workspace
        remove-dotnet:        "true"
        remove-android:       "true"
        remove-haskell:       "true"
        remove-codeql:        "true"
        remove-docker-images: "true"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 3 — Check out this repo (device tree + workflow files)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📥 Checkout device tree"
      uses: actions/checkout@v4
      with:
        path: ${{ github.workspace }}/device_tree

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 4 — Install build dependencies
    # All packages below are verified present on ubuntu-20.04
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📦 Install build dependencies"
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf \
          imagemagick lib32ncurses5-dev lib32readline-dev \
          lib32z1-dev liblz4-tool libncurses5-dev \
          libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev \
          libxml2 libxml2-utils lzop m4 \
          openjdk-11-jdk pngcrush rsync schedtool \
          squashfs-tools unzip xsltproc zip zlib1g-dev \
          python-is-python3 python3 python3-pip
        sudo ln -sf /usr/bin/python3 /usr/local/bin/python
        echo "──────────────── Versions ────────────────"
        java -version
        python3 --version
        gcc --version | head -1
        echo "✅ All dependencies installed"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 5 — ccache (speeds up repeat builds significantly)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "⚡ Restore ccache"
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key:  ccache-crosshatch-${{ github.sha }}
        restore-keys: ccache-crosshatch-

    - name: "⚙️ Configure ccache"
      run: |
        ccache --max-size=8G
        ccache --zero-stats
        echo "CCACHE_DIR=$HOME/.ccache"    >> $GITHUB_ENV
        echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
        echo "USE_CCACHE=1"               >> $GITHUB_ENV
        echo "CCACHE_COMPRESS=1"          >> $GITHUB_ENV

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 6 — Install the repo tool
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🔧 Install repo tool"
      run: |
        mkdir -p ~/bin
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
          -o ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        git config --global user.email "ci@pixelos.net"
        git config --global user.name  "PixelOS CI"
        git config --global color.ui   false
        echo "repo version: $(~/bin/repo --version 2>&1 | head -1)"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 7 — Initialize the PixelOS source manifest
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📋 Initialize PixelOS manifest"
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}
        ~/bin/repo init \
          -u ${{ env.ROM_MANIFEST }} \
          -b ${{ env.ROM_BRANCH }} \
          --depth=1 \
          --no-clone-bundle \
          --no-tags
        echo "✅ Manifest initialized"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 8 — Inject local manifests (our device tree + vendor)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🗺️ Inject local manifests"
      run: |
        mkdir -p ${{ env.BUILD_DIR }}/.repo/local_manifests
        cp ${{ github.workspace }}/device_tree/local_manifests/roomservice.xml \
           ${{ env.BUILD_DIR }}/.repo/local_manifests/
        cp ${{ github.workspace }}/device_tree/local_manifests/remove_unneeded.xml \
           ${{ env.BUILD_DIR }}/.repo/local_manifests/
        echo "✅ Local manifests ready:"
        cat ${{ env.BUILD_DIR }}/.repo/local_manifests/roomservice.xml

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 9 — Sync sources
    # This downloads ~40 GB. Expect 30–60 minutes. Do NOT cancel.
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🔄 Sync sources (~40 GB, 30–60 min)"
      run: |
        cd ${{ env.BUILD_DIR }}
        ~/bin/repo sync \
          -c \
          --jobs=$(nproc --all) \
          --no-clone-bundle \
          --no-tags \
          --force-sync
        echo "✅ Sync complete"
        df -h ${{ env.BUILD_DIR }}

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 10 — Copy device tree patches
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📁 Copy device patches"
      run: |
        mkdir -p ${{ env.BUILD_DIR }}/device/google/crosshatch/patches
        cp -r ${{ github.workspace }}/device_tree/patches/. \
              ${{ env.BUILD_DIR }}/device/google/crosshatch/patches/
        echo "✅ Patches copied"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 11 — Prebuilt kernel (skip kernel compile = saves 45 min + 8 GB)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🐧 Setup prebuilt kernel"
      run: |
        PREBUILT="${{ env.BUILD_DIR }}/device/google/crosshatch/prebuilt"
        VENDOR_K="${{ env.BUILD_DIR }}/vendor/google/crosshatch/kernel/Image.lz4-dtb"
        mkdir -p "$PREBUILT"
        if [ -f "$VENDOR_K" ]; then
          cp "$VENDOR_K" "$PREBUILT/Image.lz4-dtb"
          [ -f "${VENDOR_K%/*}/dtbo.img" ] && \
            cp "${VENDOR_K%/*}/dtbo.img" "$PREBUILT/dtbo.img"
          echo "✅ Prebuilt kernel copied from vendor blobs"
        else
          echo "ℹ️ No vendor kernel found — removing prebuilt refs, will compile"
          sed -i '/TARGET_PREBUILT_KERNEL\|BOARD_PREBUILT_DTBOIMAGE/d' \
            ${{ env.BUILD_DIR }}/device/google/crosshatch/BoardConfig.mk
        fi

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 12 — Apply crosshatch compatibility patches
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🩹 Apply crosshatch patches"
      run: |
        cd ${{ env.BUILD_DIR }}
        bash device/google/crosshatch/patches/apply_patches.sh
        echo "✅ Patches applied"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 13 — Build ROM
    # This takes 2–4 hours. Output is PixelOS-*.zip in out/target/product/crosshatch
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🔨 Build ROM (2–4 hours)"
      run: |
        cd ${{ env.BUILD_DIR }}
        source build/envsetup.sh
        lunch pixelos_${{ env.DEVICE }}-${{ github.event.inputs.BUILD_TYPE }}
        make bacon -j$(nproc --all) 2>&1 | tee /tmp/build.log
        echo "✅ Build complete"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 14 — Collect build outputs
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📦 Collect build outputs"
      id: rom
      run: |
        OUT="${{ env.BUILD_DIR }}/out/target/product/${{ env.DEVICE }}"
        ZIP=$(ls "$OUT"/PixelOS*.zip 2>/dev/null | tail -1)
        if [ -z "$ZIP" ]; then
          echo "❌ No ROM ZIP found. Build output:"
          ls -lh "$OUT" 2>/dev/null || echo "Output dir missing"
          exit 1
        fi
        NAME=$(basename "$ZIP")
        MD5=$(md5sum "$ZIP" | cut -d' ' -f1)
        DATE=$(date -u +%Y%m%d)
        echo "zip=$ZIP"   >> $GITHUB_OUTPUT
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "md5=$MD5"   >> $GITHUB_OUTPUT
        echo "date=$DATE" >> $GITHUB_OUTPUT
        cp "$OUT/boot.img"   /tmp/ 2>/dev/null || true
        cp "$OUT/dtbo.img"   /tmp/ 2>/dev/null || true
        cp "$OUT/vbmeta.img" /tmp/ 2>/dev/null || true
        echo "✅ ROM: $NAME ($MD5)"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 15 — Upload to GitHub Artifacts (7-day retention)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "⬆️ Upload to GitHub Artifacts"
      uses: actions/upload-artifact@v4
      with:
        name: "PixelOS-crosshatch-${{ steps.rom.outputs.date }}"
        path: |
          ${{ steps.rom.outputs.zip }}
          /tmp/boot.img
          /tmp/dtbo.img
          /tmp/vbmeta.img
        retention-days: 7

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 16 — Create GitHub Release (auto tag + notes)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🚀 Create GitHub Release"
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.rom.outputs.date }}"
        name:     "PixelOS 14 — Pixel 3 XL — ${{ steps.rom.outputs.date }}"
        body: |
          ## PixelOS Android 14 — Pixel 3 XL (crosshatch)
          **MD5:** `${{ steps.rom.outputs.md5 }}`
          **Build type:** ${{ github.event.inputs.BUILD_TYPE }}

          ### How to Flash
          1. Boot TWRP
          2. Wipe → System, Data, Dalvik / ART Cache
          3. Flash this ZIP
          4. Reboot (first boot takes ~5 minutes)

          ### Features
          ✅ NFC | ✅ Wireless Charging | ✅ GCam | ✅ SELinux Enforcing | ✅ Play Integrity
        files: |
          ${{ steps.rom.outputs.zip }}
          /tmp/boot.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 17 — Telegram notification (only if secret is configured)
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📨 Notify via Telegram"
      if: success() && env.TG_TOKEN != ''
      env:
        TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          -d chat_id="${TG_CHAT}" \
          -d parse_mode="Markdown" \
          -d text="✅ *PixelOS 14 — Pixel 3 XL built!*%0A📦 \`${{ steps.rom.outputs.name }}\`%0A🔑 MD5: \`${{ steps.rom.outputs.md5 }}\`%0A📥 https://github.com/phoenixdevellopment75-web/pixel-os-crosshatch-port/releases"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 18 — Always: print ccache stats
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📊 ccache stats"
      if: always()
      run: ccache --show-stats

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 19 — On failure: upload logs for debugging
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📋 Upload failure logs"
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: "build-logs-run${{ github.run_number }}"
        path: /tmp/build.log
        if-no-files-found: ignore
        retention-days: 3
