name: "🔨 Build PixelOS — Pixel 3 XL (crosshatch)"

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: "Build type"
        default: "user"
        type: choice
        options: [user, userdebug]

env:
  DEVICE:   crosshatch
  MANIFEST: https://github.com/PixelOS-AOSP/manifest
  BRANCH:   fourteen

jobs:
  build:
    name: "🏗️ Build (GitHub-Hosted)"
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # ── STEP 1: Free up disk (~65 GB usable after this) ───────────────────
      - name: "💾 Maximize disk space"
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb:      6144
          swap-size-mb:         8192
          build-mount-path:     /mnt/workspace
          remove-dotnet:        "true"
          remove-android:       "true"
          remove-haskell:       "true"
          remove-codeql:        "true"
          remove-docker-images: "true"

      # ── STEP 2: Checkout the device tree (this repo) ──────────────────────
      - name: "📥 Checkout device tree"
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}/device_tree

      # ── STEP 3: Install build dependencies ────────────────────────────────
      - name: "📦 Install build deps"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            lib32ncurses5-dev lib32z1-dev libelf-dev \
            libncurses5-dev libssl-dev libxml2-utils lzop \
            m4 openjdk-11-jdk pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3

      # ── STEP 4: Restore ccache ─────────────────────────────────────────────
      - name: "⚡ Restore ccache"
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key:  ccache-crosshatch-${{ github.sha }}
          restore-keys: |
            ccache-crosshatch-

      - name: "⚙️ Configure ccache"
        run: |
          ccache --max-size=8G
          echo "USE_CCACHE=1"                >> $GITHUB_ENV
          echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache"    >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1"           >> $GITHUB_ENV

      # ── STEP 5: Set up the repo tool ──────────────────────────────────────
      - name: "🔧 Setup repo tool"
        run: |
          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
            > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.email "ci@pixelos.net"
          git config --global user.name  "PixelOS CI"
          git config --global color.ui    false

      # ── STEP 6: Init PixelOS manifest ─────────────────────────────────────
      # FIX: removed --groups flag (not supported by PixelOS manifest)
      # FIX: use /mnt/workspace which is the large volume
      - name: "📋 Init PixelOS manifest"
        run: |
          mkdir -p /mnt/workspace
          cd /mnt/workspace
          ~/bin/repo init \
            --depth=1 \
            -u ${{ env.MANIFEST }} \
            -b ${{ env.BRANCH }} \
            --no-clone-bundle \
            --no-tags

      # ── STEP 7: Inject local manifests ────────────────────────────────────
      # The local manifests tell repo sync which extra repos to add/remove
      - name: "🗺️ Inject local manifests"
        run: |
          mkdir -p /mnt/workspace/.repo/local_manifests
          cp ${{ github.workspace }}/device_tree/local_manifests/roomservice.xml \
             /mnt/workspace/.repo/local_manifests/
          cp ${{ github.workspace }}/device_tree/local_manifests/remove_unneeded.xml \
             /mnt/workspace/.repo/local_manifests/

      # ── STEP 8: Sync sources (only the repos we need) ─────────────────────
      - name: "🔄 Repo sync (~40 GB, takes 30–60 min)"
        run: |
          cd /mnt/workspace
          ~/bin/repo sync \
            -c \
            -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            --optimized-fetch \
            --fail-fast
          echo "✅ Sync complete. Disk usage:"
          df -h /mnt/workspace

      # ── STEP 9: Install device tree files ─────────────────────────────────
      # FIX: device tree was already synced via roomservice.xml,
      # but we still copy local patches folder which isn't in the manifest
      - name: "📁 Install device tree extras"
        run: |
          # Copy patches (not pulled via manifest)
          mkdir -p /mnt/workspace/device/google/crosshatch/patches
          cp -r ${{ github.workspace }}/device_tree/patches/. \
                /mnt/workspace/device/google/crosshatch/patches/

      # ── STEP 10: Fetch prebuilt kernel ────────────────────────────────────
      # Kernel is in vendor/google/crosshatch already (from TheMuppets)
      - name: "🐧 Fetch prebuilt kernel"
        run: |
          PREBUILT_DIR="/mnt/workspace/device/google/crosshatch/prebuilt"
          mkdir -p "$PREBUILT_DIR"
          # Try vendor blobs first (TheMuppets usually has the kernel)
          VENDOR_K="/mnt/workspace/vendor/google/crosshatch/kernel/Image.lz4-dtb"
          VENDOR_D="/mnt/workspace/vendor/google/crosshatch/kernel/dtbo.img"
          if [ -f "$VENDOR_K" ]; then
            echo "✅ Kernel found in vendor blobs"
            cp "$VENDOR_K" "$PREBUILT_DIR/Image.lz4-dtb"
            [ -f "$VENDOR_D" ] && cp "$VENDOR_D" "$PREBUILT_DIR/dtbo.img"
          else
            echo "⚠️ Kernel not in vendor blobs — skipping prebuilt, will compile"
            # Remove the prebuilt config so BoardConfig falls back to source compile
            sed -i '/TARGET_PREBUILT_KERNEL/d' \
              /mnt/workspace/device/google/crosshatch/BoardConfig.mk
            sed -i '/BOARD_PREBUILT_DTBOIMAGE/d' \
              /mnt/workspace/device/google/crosshatch/BoardConfig.mk
          fi

      # ── STEP 11: Apply crosshatch compatibility patches ───────────────────
      - name: "🩹 Apply crosshatch patches"
        run: |
          cd /mnt/workspace
          bash device/google/crosshatch/patches/apply_patches.sh

      # ── STEP 12: Build the ROM ─────────────────────────────────────────────
      - name: "🔨 Build ROM (takes 2–4 hours)"
        run: |
          cd /mnt/workspace
          source build/envsetup.sh
          lunch pixelos_crosshatch-${{ github.event.inputs.BUILD_TYPE || 'user' }}
          make bacon -j$(nproc --all) 2>&1 | tee /tmp/build.log
          echo "Build exit code: $?"

      # ── STEP 13: Collect build outputs ────────────────────────────────────
      - name: "📦 Collect artifacts"
        id: out
        run: |
          D="/mnt/workspace/out/target/product/crosshatch"
          ZIP=$(ls ${D}/PixelOS*.zip 2>/dev/null | tail -1)
          if [ -z "$ZIP" ]; then
            echo "❌ No ROM ZIP found in output directory"
            ls -la "$D" || true
            exit 1
          fi
          echo "zip=${ZIP}"                            >> $GITHUB_OUTPUT
          echo "name=$(basename ${ZIP})"               >> $GITHUB_OUTPUT
          echo "md5=$(md5sum ${ZIP} | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d)"              >> $GITHUB_OUTPUT
          cp ${D}/boot.img   /tmp/ 2>/dev/null || true
          cp ${D}/dtbo.img   /tmp/ 2>/dev/null || true
          cp ${D}/vbmeta.img /tmp/ 2>/dev/null || true
          echo "✅ ROM: $(basename $ZIP) ($(du -sh $ZIP | cut -f1))"

      # ── STEP 14: Upload ROM to GitHub Artifacts ────────────────────────────
      - name: "⬆️ Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "PixelOS-crosshatch-${{ steps.out.outputs.date }}"
          path: |
            ${{ steps.out.outputs.zip }}
            /tmp/boot.img
            /tmp/dtbo.img
            /tmp/vbmeta.img
          retention-days: 7

      # ── STEP 15: Create GitHub Release ────────────────────────────────────
      - name: "🚀 Create GitHub Release"
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.out.outputs.date }}"
          name:     "PixelOS 14 — Pixel 3 XL — ${{ steps.out.outputs.date }}"
          body: |
            ## PixelOS Android 14 — Pixel 3 XL (crosshatch)
            **MD5:** `${{ steps.out.outputs.md5 }}`
            **Build type:** ${{ github.event.inputs.BUILD_TYPE || 'user' }}

            ### Flash Instructions
            1. Boot TWRP → Wipe System + Data + Dalvik
            2. Flash this ZIP → Reboot (first boot ~5 min)

            ### Features
            ✅ NFC | ✅ Wireless Charging | ✅ GCam | ✅ SELinux Enforcing | ✅ Play Integrity
          files: |
            ${{ steps.out.outputs.zip }}
            /tmp/boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── STEP 16: Telegram notification ────────────────────────────────────
      - name: "📨 Telegram notification"
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="✅ *PixelOS 14 — Pixel 3 XL built!*
          📦 \`${{ steps.out.outputs.name }}\`
          🔑 \`${{ steps.out.outputs.md5 }}\`
          📥 [Download](https://github.com/phoenixdevellopment75-web/pixel-os-crosshatch-port/releases)"

      # ── STEP 17: ccache stats ──────────────────────────────────────────────
      - name: "📊 ccache stats"
        if: always()
        run: ccache --show-stats

      # ── STEP 18: Upload build log on failure ──────────────────────────────
      - name: "📋 Upload build log (on failure)"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "build-log-failed"
          path: /tmp/build.log
          retention-days: 3
