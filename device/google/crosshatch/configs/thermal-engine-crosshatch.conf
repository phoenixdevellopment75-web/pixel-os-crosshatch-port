# thermal-engine-crosshatch.conf
# Thermal Engine Configuration for Pixel 3 XL (crosshatch)
# Adapted from beryllium; updated thermal zones for crosshatch hardware layout

[ss-cpu-gold]
algo_type       ss
temp            65000
sampling        10000
set_point       60000
set_point_clr   55000
sensors         cpu-1-1
devices         cpu

[ss-cpu-silver]
algo_type       ss
temp            75000
sampling        10000
set_point       70000
set_point_clr   65000
sensors         cpu-1-0
devices         cpu

[gpu-step]
algo_type       step
temp            80000
sampling        10000
sensors         gpu
actions         gpu
thresholds      75000           80000
thresholds_clr  70000           75000
actions         gpu             gpu
values          710000000       598000000

[modem-step]
algo_type       step
temp            95000
sampling        5000
sensors         mdm-q6
actions         modem
thresholds      90000           95000
thresholds_clr  85000           90000
actions         modem           modem
values          1               2

[battery-monitor]
algo_type       monitor
temp            45000
sampling        30000
sensors         battery
thresholds      40000           45000
thresholds_clr  38000           43000
actions         none            battery
values          0               1

[wireless-charging-monitor]
# Pixel 3 XL specific: thermal limit when wireless charging
algo_type       monitor
temp            40000
sampling        15000
sensors         battery
thresholds      38000
thresholds_clr  35000
actions         wlc_limit
values          1

[camera-step]
algo_type       step
temp            95000
sampling        5000
sensors         camera-isp
actions         none
thresholds      90000
thresholds_clr  85000
