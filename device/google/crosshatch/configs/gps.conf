# gps.conf — Pixel 3 XL (crosshatch) GPS configuration

# XTRA GNSS assistance
XTRA_SERVER_1=https://glltos1.glpals.com/4day/v5/latest/lto2.dat
XTRA_SERVER_2=https://glltos2.glpals.com/4day/v5/latest/lto2.dat
XTRA_SERVER_3=https://glltos3.glpals.com/4day/v5/latest/lto2.dat

# Google supl server
SUPL_HOST=supl.google.com
SUPL_PORT=7275
SUPL_MODE=0x1
SUPL_ES=1

# NTP servers
NTP_SERVER=time.izatcloud.net

# GNSS constellations (GPS + GLONASS + BeiDou + Galileo)
A_GLONASS_POS_PROTOCOL_SELECT=0xF
LPPE_CP_TECHNOLOGY=0x0
LPPE_UP_TECHNOLOGY=0x0

# Qualcomm IZat
INTERMEDIATE_POS=0
ACCURACY_THRES=5000
CAPABILITIES=0x23

# Emergency
NMEA_PROVIDER=0
NMEA_ALLOWED=true

# Debug
ERR_ESTIMATE=0
DEBUG_LEVEL=2

# Crosshatch: use hardware-accelerated GNSS
USE_LEGACY_GNSS_INTERFACE=0
